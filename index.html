<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Ấn Sắc Màu - Đặt In Trực Tuyến</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/product.css"> </head>
<body>

    <header id="dynamic-header"></header>

    <section class="hero" id="hero">
        <div class="hero-text">
            <span class="badge">In Ấn Sắc Màu • Đồng Tháp</span>
            <h1>Định Hình Tiêu Chuẩn In Ấn Chuyên Nghiệp</h1>
            <p>Xưởng in trực tiếp không qua trung gian. Giải pháp in offset và kỹ thuật số tốc độ cao, độ sắc nét tuyệt đối.</p>
            <button class="btn-cta" onclick="openOrderModal()">Nhận Báo Giá Ngay</button>
        </div>
        <div class="hero-visual" id="hero-products-list">
            <p style="color:#94a3b8;">Đang tải sản phẩm nổi bật...</p>
        </div>
    </section>

    <section id="stats">...</section> 
    <section id="products">...</section>

    <div class="modal-overlay" id="orderModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeOrderModal()">&times;</span>
            <h3>Yêu Cầu Báo Giá</h3>
            <div class="form-row"><label>Tên / Doanh Nghiệp (*)</label><input type="text" id="cusName" required></div>
            <div class="form-row"><label>Số điện thoại / Zalo (*)</label><input type="tel" id="cusPhone" required></div>
            <div class="form-row"><label>Yêu cầu chi tiết</label><textarea id="orderNote" rows="3"></textarea></div>
            <button class="btn-order" style="width: 100%;" id="btnSubmitFinalOrder" onclick="processFinalOrder()">GỬI YÊU CẦU</button>
        </div>
    </div>

    <footer id="dynamic-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/components.js"></script>
    <script src="js/api.js"></script>
    <script src="js/home.js"></script> </body>
</html>
